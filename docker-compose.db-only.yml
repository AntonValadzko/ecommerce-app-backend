# Minimal local stack: PostgreSQL only (no PgBouncer, OpenSearch, or Redis).
# Use with OPENSEARCH_ENABLED=false and REDIS_ENABLED=false in .env
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U catalog -d catalog']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
